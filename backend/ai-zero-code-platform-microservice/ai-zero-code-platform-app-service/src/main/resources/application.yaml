server:
  port: 8125
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 3600

spring:
  application:
    name: ai-zero-code-platform-app-service
  profiles:
    active: local
  session:
    store-type: redis
    timeout: 3600

dubbo:
  application:
    name: ${spring.application.name}
    qos-enable: false
  protocol:
    name: dubbo
    port: 20882
  registry:
    address: nacos://${NACOS_SERVER_ADDR:127.0.0.1:8848}
  scan:
    base-packages: com.lk.aizerocodeplatform.rpc

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.lk.aizerocodeplatform.controller

knife4j:
  enable: true
  setting:
    language: zh_cn

mybatis-flex:
  type-aliases-package: com.lk.aizerocodeplatform.model.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    logic-delete-column: isDelete
    normal-value-of-logic-delete: 0
    deleted-value-of-logic-delete: 1

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
