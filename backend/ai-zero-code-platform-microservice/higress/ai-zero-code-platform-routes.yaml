apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-zero-code-platform
  namespace: default
  annotations:
    higress.io/backend-protocol: HTTP
spec:
  ingressClassName: higress
  rules:
    - http:
        paths:
          - path: /api/user
            pathType: Prefix
            backend:
              service:
                name: ai-zero-code-platform-user-service
                port:
                  number: 8124
          - path: /api/app
            pathType: Prefix
            backend:
              service:
                name: ai-zero-code-platform-app-service
                port:
                  number: 8125
          - path: /api/appFeaturedApply
            pathType: Prefix
            backend:
              service:
                name: ai-zero-code-platform-app-service
                port:
                  number: 8125
          - path: /api/chatHistory
            pathType: Prefix
            backend:
              service:
                name: ai-zero-code-platform-app-service
                port:
                  number: 8125
          - path: /api/static
            pathType: Prefix
            backend:
              service:
                name: ai-zero-code-platform-app-service
                port:
                  number: 8125
